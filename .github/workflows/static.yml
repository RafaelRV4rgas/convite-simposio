# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- PASSOS ADICIONADOS PARA O REACT ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Instala as dependências do package.json
      - name: Install dependencies
        run: npm ci

      # Executa a build para criar a pasta 'dist'
      - name: Build project
        run: npm run build
      # ----------------------------------------

      # O Setup Pages original do seu arquivo
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload do artefato (agora a pasta './dist' vai existir!)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Altere para './build' se você usar Create React App em vez de Vite

      # Deploy final
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
